services:
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_CONTEXT_LENGTH: 16384  # контекст 16k токенов вместо 4096 (OLLAMA_NUM_CTX не работает в 0.18.x)
      OLLAMA_NUM_PARALLEL: 1        # CPU — параллельность бессмысленна
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - ai-platform
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ai-platform
    restart: unless-stopped

  rag_service:
    build:
      context: ./services/rag_service
    env_file:
      - .env
    environment:
      SERVICE_NAME: rag_service
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      QDRANT_URL: http://qdrant:6333
      TORCH_NUM_THREADS: ${TORCH_NUM_THREADS:-28}
      TORCH_NUM_INTEROP_THREADS: ${TORCH_NUM_INTEROP_THREADS:-4}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-128}
      VISION_ENABLED: ${VISION_ENABLED:-true}
      VISION_MODEL_ID: ${VISION_MODEL_ID:-AvitoTech/avision}
      VISION_PRELOAD: ${VISION_PRELOAD:-true}
      VISION_MAX_NEW_TOKENS: ${VISION_MAX_NEW_TOKENS:-64}
      VISION_MAX_IMAGE_SIDE: ${VISION_MAX_IMAGE_SIDE:-1024}
      VISION_MAX_IMAGES: ${VISION_MAX_IMAGES:-5}
      VISION_MIN_IMAGE_SIDE: ${VISION_MIN_IMAGE_SIDE:-100}
    ports:
      - "8001:8001"
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - ./data/hf_cache:/root/.cache/huggingface
    networks:
      - ai-platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  content_service:
    build:
      context: ./services/content_service
    env_file:
      - .env
    environment:
      SERVICE_NAME: content_service
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      STT_BASE_URL: ${STT_BASE_URL}
      STT_API_KEY: ${STT_API_KEY}
      STT_MODE: ${STT_MODE:-auto}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      TTS_VOICE_ALEX: ${TTS_VOICE_ALEX}
      TTS_VOICE_MARIA: ${TTS_VOICE_MARIA}
      AUDIO_DIR: /app/audio
    ports:
      - "8002:8002"
    volumes:
      - ./data/audio:/app/audio
    networks:
      - ai-platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: ./services/gateway
    env_file:
      - .env
    environment:
      RAG_SERVICE_URL: http://rag_service:8001
      CONTENT_SERVICE_URL: http://content_service:8002
      CORS_ORIGINS: ${CORS_ORIGINS}
      TLS_CERT_FILE: ${TLS_CERT_FILE}
      TLS_KEY_FILE: ${TLS_KEY_FILE}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-300}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DB_PATH: /app/data/platform.db
    depends_on:
      rag_service:
        condition: service_healthy
      content_service:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "443:443"
    volumes:
      - ./certs:/app/certs:ro
      - ./data/gateway:/app/data
    networks:
      - ai-platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

networks:
  ai-platform:
    name: ai-platform
    driver: bridge
