services:
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - ai-platform
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ai-platform
    restart: unless-stopped

  rag_service:
    build:
      context: ./services/rag_service
    env_file:
      - .env
    environment:
      SERVICE_NAME: rag_service
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      OPEN_EMBEDDER_BASE_URL: ${OPEN_EMBEDDER_BASE_URL:-https://hackai.centrinvest.ru:6620/v1}
      OPEN_EMBEDDER_API_KEY: ${OPEN_EMBEDDER_API_KEY:-hackaton2026}
      OPEN_EMBEDDER_MODEL: ${OPEN_EMBEDDER_MODEL:-Qwen3-Embedding-0.6B}
      OPEN_EMBEDDING_TIMEOUT_SECONDS: ${OPEN_EMBEDDING_TIMEOUT_SECONDS:-120}
      OPEN_EMBEDDING_MAX_CONNECTIONS: ${OPEN_EMBEDDING_MAX_CONNECTIONS:-128}
      OPEN_EMBEDDING_MAX_KEEPALIVE_CONNECTIONS: ${OPEN_EMBEDDING_MAX_KEEPALIVE_CONNECTIONS:-32}
      OPEN_EMBEDDING_BATCH_SIZE: ${OPEN_EMBEDDING_BATCH_SIZE:-256}
      OPEN_EMBEDDING_CONCURRENCY: ${OPEN_EMBEDDING_CONCURRENCY:-4}
      QDRANT_URL: http://qdrant:6333
      CHUNK_SIZE: ${CHUNK_SIZE:-1024}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-32}
      TORCH_NUM_THREADS: ${TORCH_NUM_THREADS:-28}
      TORCH_NUM_INTEROP_THREADS: ${TORCH_NUM_INTEROP_THREADS:-4}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-256}
      EMBEDDING_PRELOAD: ${EMBEDDING_PRELOAD:-true}
      BLOCKING_MODEL_PRELOAD: ${BLOCKING_MODEL_PRELOAD:-true}
      VISION_ENABLED: ${VISION_ENABLED:-true}
      VISION_MODEL_ID: ${VISION_MODEL_ID:-AvitoTech/avision}
      VISION_PRELOAD: ${VISION_PRELOAD:-true}
      VISION_MAX_NEW_TOKENS: ${VISION_MAX_NEW_TOKENS:-48}
      VISION_MAX_IMAGE_SIDE: ${VISION_MAX_IMAGE_SIDE:-896}
      VISION_MIN_IMAGE_SIDE: ${VISION_MIN_IMAGE_SIDE:-220}
      VISION_MAX_IMAGES_PER_DOCUMENT: ${VISION_MAX_IMAGES_PER_DOCUMENT:-4}
      VISION_LARGE_DOCUMENT_BYTES_THRESHOLD: ${VISION_LARGE_DOCUMENT_BYTES_THRESHOLD:-4000000}
      VISION_LARGE_DOCUMENT_MAX_IMAGES: ${VISION_LARGE_DOCUMENT_MAX_IMAGES:-1}
      VISION_LARGE_DOCUMENT_MAX_NEW_TOKENS: ${VISION_LARGE_DOCUMENT_MAX_NEW_TOKENS:-32}
    ports:
      - "8001:8001"
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - ./data/hf_cache:/root/.cache/huggingface
    networks:
      - ai-platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 240s
    restart: unless-stopped

  content_service:
    build:
      context: ./services/content_service
    env_file:
      - .env
    environment:
      SERVICE_NAME: content_service
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_OPEN_TIMEOUT_SECONDS: ${LLM_OPEN_TIMEOUT_SECONDS:-180}
      LLM_OPEN_MAX_CONNECTIONS: ${LLM_OPEN_MAX_CONNECTIONS:-200}
      LLM_OPEN_MAX_KEEPALIVE_CONNECTIONS: ${LLM_OPEN_MAX_KEEPALIVE_CONNECTIONS:-50}
      LLM_CLOSED_TIMEOUT_SECONDS: ${LLM_CLOSED_TIMEOUT_SECONDS:-300}
      LLM_CLOSED_MAX_CONNECTIONS: ${LLM_CLOSED_MAX_CONNECTIONS:-64}
      LLM_CLOSED_MAX_KEEPALIVE_CONNECTIONS: ${LLM_CLOSED_MAX_KEEPALIVE_CONNECTIONS:-16}
      TIMELINE_MAX_TOKENS: ${TIMELINE_MAX_TOKENS:-700}
      CONTRACT_EXTRACT_MAX_TOKENS: ${CONTRACT_EXTRACT_MAX_TOKENS:-1200}
      CONTRACT_VERIFY_MAX_TOKENS: ${CONTRACT_VERIFY_MAX_TOKENS:-1200}
      QUESTIONS_MAX_TOKENS: ${QUESTIONS_MAX_TOKENS:-1000}
      COMPARE_MAX_TOKENS: ${COMPARE_MAX_TOKENS:-1400}
      PRESENTATION_MAX_TOKENS: ${PRESENTATION_MAX_TOKENS:-1200}
      CONTENT_SERVICE_WORKERS: ${CONTENT_SERVICE_WORKERS:-4}
      STT_BASE_URL: ${STT_BASE_URL}
      STT_API_KEY: ${STT_API_KEY}
      STT_MODE: ${STT_MODE:-auto}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      TTS_VOICE_ALEX: ${TTS_VOICE_ALEX}
      TTS_VOICE_MARIA: ${TTS_VOICE_MARIA}
      AUDIO_DIR: /app/audio
    ports:
      - "8002:8002"
    volumes:
      - ./data/audio:/app/audio
    networks:
      - ai-platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: ./services/gateway
    env_file:
      - .env
    environment:
      RAG_SERVICE_URL: http://rag_service:8001
      CONTENT_SERVICE_URL: http://content_service:8002
      CORS_ORIGINS: ${CORS_ORIGINS}
      TLS_CERT_FILE: ${TLS_CERT_FILE}
      TLS_KEY_FILE: ${TLS_KEY_FILE}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-300}
      CONTRACT_MAX_TEXT_LENGTH: ${CONTRACT_MAX_TEXT_LENGTH:-16000}
      TIMELINE_MAX_TEXT_LENGTH: ${TIMELINE_MAX_TEXT_LENGTH:-12000}
      QUESTIONS_MAX_TEXT_LENGTH: ${QUESTIONS_MAX_TEXT_LENGTH:-14000}
      COMPARE_MAX_TEXT_LENGTH: ${COMPARE_MAX_TEXT_LENGTH:-12000}
      PRESENTATION_MAX_TEXT_LENGTH: ${PRESENTATION_MAX_TEXT_LENGTH:-14000}
      GATEWAY_MAX_CONNECTIONS: ${GATEWAY_MAX_CONNECTIONS:-200}
      GATEWAY_MAX_KEEPALIVE_CONNECTIONS: ${GATEWAY_MAX_KEEPALIVE_CONNECTIONS:-50}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DB_PATH: /app/data/platform.db
    depends_on:
      rag_service:
        condition: service_healthy
      content_service:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "443:443"
    volumes:
      - ./certs:/app/certs:ro
      - ./data/gateway:/app/data
    networks:
      - ai-platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

networks:
  ai-platform:
    name: ai-platform
    driver: bridge
