on:
  push:
    - workflows: [deploy]
      filter:
        branches: ["main"]

tokens:
  SERVICE_CONNECTION:
    service_connection: default_service_connection
    scope: org

workflows:
  deploy:
    runs_on: self-hosted
    settings:
      max_cube_duration: 10m
    tasks:
      - deploy-task

tasks:
  - name: deploy-task
    cubes:
      - name: deploy
        script:
          - cd /opt/hack2026
          - git pull origin main
          - docker compose up -d --build --remove-orphans
          - docker compose ps
